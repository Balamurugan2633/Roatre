<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>Roatre - Contact Us</title>
		<link rel="stylesheet" href="style.css">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
	</head>
	<body>
		<div id="site-header-placeholder"></div>

		<main class="contact-page-wrapper">
			<section class="contact-hero">
				<h1>Get in <span>Touch</span></h1>
				<p>Have questions about Roatre? Ready to elevate your academy's performance? We're here to help.</p>
			</section>

			<div class="contact-container">
				<!-- Contact Info Card -->
				<div class="contact-info-card">
					<h3>Contact Information</h3>
					<p>Fill out the form or reach us directly via these channels.</p>
					
					<div class="info-item">
						<span class="icon">📞</span>
						<div>
							<label>Phone</label>
							<a href="tel:+919876543210">+91 98765 43210</a>
						</div>
					</div>
					<div class="info-item">
						<span class="icon">📧</span>
						<div>
							<label>Email</label>
							<a href="mailto:inforoatre@gmail.com">inforoatre@gmail.com</a>
						</div>
					</div>
					<div class="info-item">
						<span class="icon">📍</span>
						<div>
							<label>Location</label>
							<p>Chennai, India</p>
						</div>
					</div>
				</div>

				<!-- Professional Form -->
				<form class="contact-form-professional" id="contactForm">
					<div class="form-grid">
						<div class="form-group">
							<label for="name">Full Name</label>
							<input type="text" id="name" name="name" placeholder="Your Name" required>
						</div>
						<div class="form-group">
							<label for="academy">Academy / Team Name</label>
							<input type="text" id="academy" name="academy" placeholder="e.g. Elite Sports Academy">
						</div>
						<div class="form-group">
							<label for="email">Email Address</label>
							<input type="email" id="email" name="email" placeholder="you@example.com" required>
						</div>
						<div class="form-group">
							<label for="phone">Phone Number</label>
							<input type="tel" id="phone" name="phone" placeholder="+91 ..." required>
						</div>
						<div class="form-group full-width">
							<label for="subject">I'm interested in...</label>
							<select id="subject" name="subject">
								<option value="support">Technical Support</option>
								<option value="partnership">Partnership Opportunities</option>
								<option value="general">General Inquiry</option>
							</select>
						</div>
						<div class="form-group full-width">
							<label for="message">Message</label>
							<textarea id="message" name="message" rows="4" placeholder="How can we help you?"></textarea>
						</div>
					</div>
					<button type="submit" class="submit-btn">Send Message</button>
				</form>
			</div>
		</main>

		<div id="site-footer-placeholder"></div>
		<script src="script.js"></script>
	</body>
</html>
